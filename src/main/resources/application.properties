# =============================================================
# CONFIGURACOES DA APLICACAO SERVIDORA (tarefa-api-server)
# =============================================================
# Este arquivo configura o comportamento da aplicacao Spring Boot.
# O Spring Boot le automaticamente o arquivo application.properties
# que estiver em src/main/resources/.

# Nome da aplicacao (usado em logs e monitoramento)
spring.application.name=tarefa-api-server

# Porta do servidor web embutido (Tomcat).
# A aplicacao estara disponivel em http://localhost:8080
server.port=8080

# =============================================================
# CONFIGURACAO DO BANCO DE DADOS H2
# =============================================================
# H2 e um banco de dados relacional escrito em Java.
# Pode rodar "em memoria" (os dados existem apenas enquanto a aplicacao esta rodando).
# E muito usado para desenvolvimento e testes por ser leve e nao precisar de instalacao.

# URL de conexao JDBC com o banco H2.
# "jdbc:h2:mem:tarefadb" = banco em memoria chamado "tarefadb"
# "mem:" significa que os dados ficam apenas na RAM (sao perdidos ao parar a aplicacao).
# Para persistir em arquivo, seria: jdbc:h2:file:./dados/tarefadb
spring.datasource.url=jdbc:h2:mem:tarefadb

# Driver JDBC do H2 (classe Java que sabe se comunicar com o banco H2)
spring.datasource.driver-class-name=org.h2.Driver

# Credenciais de acesso ao banco (padrao do H2: usuario "sa", sem senha)
spring.datasource.username=sa
spring.datasource.password=

# =============================================================
# CONFIGURACAO DO JPA / HIBERNATE
# =============================================================
# JPA = especificacao Java para ORM (mapeamento objeto-relacional)
# Hibernate = implementacao do JPA (quem realmente faz o trabalho)

# Dialeto SQL do banco de dados.
# Cada banco (MySQL, PostgreSQL, H2) tem pequenas diferencas na sintaxe SQL.
# O dialeto diz ao Hibernate como gerar SQL especifico para o H2.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ddl-auto = controla como o Hibernate gerencia o SCHEMA do banco (criacao de tabelas).
# Opcoes:
# - "create-drop" = CRIA as tabelas ao iniciar e APAGA ao encerrar (ideal para desenvolvimento)
# - "create"      = cria as tabelas ao iniciar (apaga dados existentes)
# - "update"      = atualiza o schema sem apagar dados (bom para desenvolvimento)
# - "validate"    = apenas valida se o schema esta correto (bom para producao)
# - "none"        = nao faz nada (voce gerencia o schema manualmente)
spring.jpa.hibernate.ddl-auto=create-drop

# show-sql = mostra no console todas as queries SQL executadas pelo Hibernate.
# Muito util para aprender e debugar. Em producao, geralmente fica desativado.
# Exemplo de saida: Hibernate: insert into tarefas (concluida,data_criacao,...) values (?,?,...)
spring.jpa.show-sql=true

# =============================================================
# CONSOLE WEB DO H2
# =============================================================
# O H2 tem uma interface web para visualizar e consultar o banco de dados.
# Acesse em: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:tarefadb | User: sa | Password: (vazio)

# Habilita o console web do H2
spring.h2.console.enabled=true

# Define o caminho (URL) para acessar o console
spring.h2.console.path=/h2-console

# =============================================================
# CONFIGURACAO DO SWAGGER / SPRINGDOC OPENAPI
# =============================================================
# O SpringDoc gera automaticamente a documentacao da API
# a partir dos controllers, modelos e anotacoes do codigo.

# Caminho onde o Swagger UI (interface grafica) fica disponivel.
# Acesse em: http://localhost:8080/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui.html

# Caminho onde a especificacao OpenAPI em formato JSON fica disponivel.
# Ferramentas podem consumir este JSON para gerar clientes, testes, etc.
# Acesse em: http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs

# Ordena os endpoints por metodo HTTP (GET primeiro, depois POST, PUT, DELETE).
# Outras opcoes: "alpha" (ordem alfabetica), "method" (por metodo HTTP).
springdoc.swagger-ui.operations-sorter=method

# Ordena os tags (grupos de endpoints) em ordem alfabetica.
springdoc.swagger-ui.tags-sorter=alpha

# Expande automaticamente as operacoes no Swagger UI para mostrar os detalhes.
# Opcoes: "none" (tudo fechado), "list" (mostra os endpoints), "full" (mostra tudo aberto).
springdoc.swagger-ui.doc-expansion=list
