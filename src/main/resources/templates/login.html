<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Gerenciador de Tarefas</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            min-width: 340px;
        }
        .card h1 {
            margin: 0 0 1.5rem 0;
            color: #1d1d1f;
            font-size: 1.5rem;
        }
        .card label {
            display: block;
            margin-bottom: 0.25rem;
            color: #424245;
            font-size: 0.9rem;
        }
        .card input {
            width: 100%;
            padding: 0.6rem;
            margin-bottom: 1rem;
            border: 1px solid #d2d2d7;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .card input:focus {
            outline: none;
            border-color: #007aff;
        }
        .card button {
            width: 100%;
            padding: 0.7rem;
            border: none;
            background: #007aff;
            color: white;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
        }
        .card button:hover {
            background: #0066cc;
        }
        .mensagem {
            padding: 0.6rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .erro {
            background: #ffe5e5;
            color: #c00;
        }
        .sucesso {
            background: #e5f5e5;
            color: #070;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Entrar</h1>

    <!-- Mensagens exibidas com base em parâmetros da URL -->
    <div class="mensagem erro" th:if="${param.error}">
        Usuário ou senha inválidos.
    </div>
    <div class="mensagem sucesso" th:if="${param.logout}">
        Você saiu da sua conta.
    </div>

    <!-- IMPORTANTE: action="/login" + method="post"
         O Spring Security intercepta POST /login automaticamente.
         Os campos PRECISAM se chamar "username" e "password" (padrão). -->
    <form th:action="@{/login}" method="post">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required autofocus>

        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
